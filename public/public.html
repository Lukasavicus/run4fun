<!DOCTYPE html>
<html>
<head>
	<link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="css/reset.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<title>Run4Fun Public Profile</title>

	<link rel="shortcut icon" href="/favicon-32x32.png" type="image/x-icon">
	<link rel="icon" href="/favicon-32x32.png" type="image/x-icon">
</head>
<body>
	<header>
		<div class="brand">
			<p class="brand-mark">R4F</p>
			<div>
				<h1>Run4Fun</h1>
				<p>public runner profile</p>
			</div>
		</div>
		<nav class="nav-menu">
			<ul>
				<li>
					<a href="/home.html">Login</a>
				</li>
			</ul>
		</nav>
	</header>

	<main>
		<section class="section-title">
			<div class="section-header">
				<p>Find a runner</p>
			</div>
			<form class="public-search" id="public-search-form">
				<input type="text" id="public-login" placeholder="runner login">
				<button type="submit">Search</button>
			</form>
		</section>

		<section id="public-profile"></section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/systemjs@0.19.31/dist/system.js"></script>
	<script>
		System.defaultJSExtensions = true;
		System.import('js/app/boot_public').catch(function(err){
			console.error(err);
		});
	</script>
</body>
</html>
