services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    command: sleep infinity
    environment:
      MONGODB_URI: mongodb://mongo:27017/run4fun
      PORT: 3000
    volumes:
      - ..:/workspaces/run4fun:cached
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
